events {
    worker_connections 1024;
}

http {
    # ── Upstream: Agent Platform Servers ──────────────────────────
    # ip_hash ensures the same client hits the same server for SSE stability.
    # Sessions are in PostgreSQL so any server CAN handle any request,
    # but SSE streams benefit from connection stickiness.
    upstream agent_platform {
        ip_hash;
        server app-1:8000;
        server app-2:8000;
        server app-3:8000;
    }

    # ── Server Block ─────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Large timeouts for long-running agent queries
        proxy_connect_timeout 10s;
        proxy_read_timeout 600s;     # 10 min for complex runs
        proxy_send_timeout 60s;

        # ── Regular API Endpoints ────────────────────────────────
        location / {
            proxy_pass http://agent_platform;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── SSE Streaming Endpoint ───────────────────────────────
        # Special config: disable buffering for real-time events
        location /execute/stream {
            proxy_pass http://agent_platform;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Critical for SSE
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;

            # Longer timeout for streaming
            proxy_read_timeout 600s;
        }

        # ── Health Check (no auth) ───────────────────────────────
        location /health {
            proxy_pass http://agent_platform;
            proxy_set_header Host $host;
        }
    }
}
